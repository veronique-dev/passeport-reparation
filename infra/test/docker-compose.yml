# Environnement de TEST — entrée unique via le frontend (nginx → gateway).
# Usage :
#   cp infra/test/.env.example infra/test/.env   # puis éditer
#   docker compose -f infra/test/docker-compose.yml --env-file infra/test/.env up -d --build
#
# URLs typiques :
#   App     http://<HOST>/
#   API     http://<HOST>/api/...
#   Mailpit http://<HOST>:8025/

name: passeport-test

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-passeport}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-passeport} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # Pas de port publié — DB interne uniquement

  mailhog:
    image: axllent/mailpit:v1.22
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
    restart: unless-stopped

  media-service:
    build:
      context: ../..
      dockerfile: services/media-service/Dockerfile
    environment:
      MEDIA_STORAGE_PATH: /data/media
      MEDIA_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    volumes:
      - media_data:/data/media
    restart: unless-stopped

  auth-service:
    build:
      context: ../..
      dockerfile: services/auth-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-passeport}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APP_FRONTEND_URL: ${PUBLIC_BASE_URL}
      MAIL_ENABLED: ${MAIL_ENABLED:-true}
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_FROM: ${MAIL_FROM:-noreply@passeport-reparation.test}
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    restart: unless-stopped

  diagnosis-service:
    build:
      context: ../..
      dockerfile: services/diagnosis-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/diagnosis_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-passeport}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      VISION_PROVIDER: ${VISION_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4o-mini}
      MEDIA_SERVICE_URL: http://media-service:8083
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  repairer-service:
    build:
      context: ../..
      dockerfile: services/repairer-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/repairer_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-passeport}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
    environment:
      AUTH_SERVICE_URL: http://auth-service:8084
      MEDIA_SERVICE_URL: http://media-service:8083
      DIAGNOSIS_SERVICE_URL: http://diagnosis-service:8081
      REPAIRER_SERVICE_URL: http://repairer-service:8082
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      - auth-service
      - media-service
      - diagnosis-service
      - repairer-service
    restart: unless-stopped
    # Pas de port publié — accessible via nginx frontend (/api)

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
