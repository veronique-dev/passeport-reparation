<section class="auth-stage">
  <aside class="auth-stage__mood" aria-hidden="true">
    <div class="auth-stage__mood-top">
      <p class="auth-stage__brand">Passeport de réparation</p>
      <span class="auth-stage__rule"></span>
    </div>

    <div class="auth-stage__mood-center">
      <p class="auth-stage__slogan">
        <span>Répare d’abord.</span>
        <span class="auth-stage__slogan-soft">Achète ensuite.</span>
      </p>
      <p class="auth-stage__mood-lead">Ton appareil a encore une chance.</p>
    </div>

    <p class="auth-stage__mood-bottom auth-stage__mood-hint">
      Lave-linge · lave-vaisselle · four
    </p>
  </aside>

  <div class="auth-stage__panel">
    <div class="auth-stage__panel-inner">
      <header>
        <p class="auth-stage__kicker">Compte</p>
        <h1 class="auth-stage__title">Mot de passe oublié</h1>
        <p class="auth-stage__lead">Entre ton email — on t’envoie un lien sécurisé.</p>
      </header>

      <form class="auth-stage__form" (ngSubmit)="submit()" #f="ngForm" *ngIf="!success">
        <label class="field">
          <span>Email</span>
          <input name="email" type="email" required [(ngModel)]="email" autocomplete="email" placeholder="toi@email.com" />
        </label>
        <p class="auth-stage__error" *ngIf="error" role="alert">{{ error }}</p>
        <button class="btn btn--primary auth-stage__cta" type="submit" [disabled]="loading || f.invalid">
          {{ loading ? 'Envoi…' : 'Envoyer le lien' }}
        </button>
      </form>

      <p class="auth-stage__ok" *ngIf="success">{{ success }}</p>

      <p class="auth-stage__links">
        <a routerLink="/connexion">Retour connexion</a>
      </p>
    </div>
  </div>
</section>
