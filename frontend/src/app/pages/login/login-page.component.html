<section class="auth container">
  <header class="auth__head">
    <p class="auth__eyebrow">Compte</p>
    <h1>Connexion</h1>
    <p>Retrouve tes passeports et continue sans tout recommencer.</p>
  </header>

  <form class="auth__form" (ngSubmit)="submit()" #f="ngForm">
    <label>
      <span>Email</span>
      <input name="email" type="email" required [(ngModel)]="email" autocomplete="email" />
    </label>
    <label>
      <span>Mot de passe</span>
      <input name="password" type="password" required minlength="8" [(ngModel)]="password" autocomplete="current-password" />
    </label>

    <p class="auth__error" *ngIf="error" role="alert">{{ error }}</p>

    <button class="btn btn--primary" type="submit" [disabled]="loading || f.invalid">
      {{ loading ? 'Connexion…' : 'Se connecter' }}
    </button>
  </form>

  <p class="auth__links">
    <a routerLink="/mot-de-passe-oublie">Mot de passe oublié</a>
    <a routerLink="/inscription">Créer un compte</a>
  </p>
</section>
