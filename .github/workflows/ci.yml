name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Unit tests (services)
        run: >
          mvn -B -pl
          services/auth-service,services/diagnosis-service,services/media-service,services/repairer-service
          -am test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:ci
      - run: npm run build

  docker-test-compose:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Validate test compose file
        run: |
          cp infra/test/.env.example infra/test/.env
          sed -i 's|http://TON_IP_OU_DOMAINE|http://localhost|g' infra/test/.env
          sed -i 's|change-me-strong-password|ci-test-password-ok|g' infra/test/.env
          sed -i 's|change-me-jwt-secret-at-least-32-characters|ci-test-jwt-secret-32chars-min!!|g' infra/test/.env
          docker compose -f infra/test/docker-compose.yml --env-file infra/test/.env config >/dev/null
