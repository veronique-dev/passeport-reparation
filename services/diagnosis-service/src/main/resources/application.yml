server:
  port: 8081

spring:
  application:
    name: diagnosis-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/diagnosis_db}
    username: ${SPRING_DATASOURCE_USERNAME:passeport}
    password: ${SPRING_DATASOURCE_PASSWORD:passeport123}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

app:
  vision:
    provider: ${VISION_PROVIDER:mock}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      model: ${OPENAI_VISION_MODEL:gpt-4o-mini}
  media:
    service-url: ${MEDIA_SERVICE_URL:http://localhost:8083}
  jwt:
    secret: ${JWT_SECRET:passeport-reparation-dev-secret-change-me-32chars-min}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
