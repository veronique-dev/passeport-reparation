server:
  port: 8081

spring:
  application:
    name: diagnosis-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/diagnosis_db}
    username: ${SPRING_DATASOURCE_USERNAME:passeport}
    password: ${SPRING_DATASOURCE_PASSWORD:passeport123}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

app:
  vision:
    provider: ${VISION_PROVIDER:mock}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
