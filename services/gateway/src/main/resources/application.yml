server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      # CORS géré par CorsConfig (app.cors.allowed-origins) pour supporter l’env de test.
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/auth/**
        - id: media-service
          uri: ${MEDIA_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/media/**
        - id: diagnosis-service
          uri: ${DIAGNOSIS_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/diagnoses/**
        - id: repairer-service
          uri: ${REPAIRER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/repairers/**

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:4201,http://localhost:8090}

management:
  endpoints:
    web:
      exposure:
        include: health,info
