server:
  port: 8082

spring:
  application:
    name: repairer-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/repairer_db}
    username: ${SPRING_DATASOURCE_USERNAME:passeport}
    password: ${SPRING_DATASOURCE_PASSWORD:passeport123}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
